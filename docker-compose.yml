services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: zotato-postgres
    environment:
      POSTGRES_DB: zotatoFoods
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - zotato_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zotatoFoods"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zotato_pgdata:
